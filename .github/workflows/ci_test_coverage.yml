name: CI – Test Coverage Check

on:
  pull_request:
    branches: [main, development]

jobs:
  test-coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Prepare google-services.json
        shell: bash
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" ]; then
            echo "✅  Decoding google-services.json from secret…"
            echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > app/google-services.json
            grep -q '"project_info"' app/google-services.json
          else
            echo "ℹ️  Secret missing – using stub google-services.json"
            printf '%s\n' \
              '{' \
              '  "project_info": {' \
              '    "project_number": "000000000000",' \
              '    "project_id": "stub-project"' \
              '  }' \
              '}' > app/google-services.json
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Generate keys.properties
        run: |
          echo "TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" > keys.properties
          cp keys.properties ./data/remote_data_source/search/keys.properties

      - name: Run unit tests + Kover
        run: ./gradlew test koverVerify koverXmlReport koverHtmlReport

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/reports/kover/merged/report.xml
          flags: unittests
          name: novix-coverage-report