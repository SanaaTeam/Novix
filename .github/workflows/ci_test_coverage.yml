name: CI - Test Coverage Check

on:
  pull_request:
    branches:
      - development

jobs:
  test-coverage:
    runs-on: ubuntu-latest

    env:
      COVERAGE_THRESHOLD: 80

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '22'
          distribution: 'temurin'

      - name: Grant permission for Gradle
        run: chmod +x ./gradlew

      - name: Run Unit Tests with Kover Coverage
        run: ./gradlew :app:testDebugUnitTest :app:koverVerify :app:koverXmlReport :app:koverHtmlReport

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: app/build/reports/kover/report.xml
          flags: unittests
          name: novix-coverage-report