name: CI – Test Coverage Check

on:
  pull_request:
    branches: [main, development]

jobs:
  test-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Restore google-services.json
        if: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 != '' }}
        shell: bash
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > app/google-services.json
          grep -q '"project_info"' app/google-services.json

      - name: Add stub google-services.json for forks
        if: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 == '' }}
        run: |
          cat > app/google-services.json <<'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "stub-project"
            }
          }
          JSON

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests and Kover
        run: ./gradlew test koverVerify koverXmlReport koverHtmlReport

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/reports/kover/merged/report.xml
          flags: unittests
          name: novix-coverage-report
