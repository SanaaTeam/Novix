name: Build & upload to Firebase App Distribution

on:
  workflow_run:
    workflows: [ "Verify build compile" ]
    types:
      - completed

jobs:
  distribute:
    name: Distribute bundle to firebase
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4

        with:
          distribution: 'temurin'
          java-version: 17

      - name: Prepare google-services.json
        shell: bash
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" ]; then
            echo "✅  Decoding google-services.json from secret…"
            echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > app/google-services.json
            grep -q '"project_info"' app/google-services.json
            # 👇 Optional: Copy to release variant folder too
            mkdir -p app/src/release
            cp app/google-services.json app/src/release/google-services.json
          else
            echo "ℹ️  Secret missing – using stub google-services.json"
            printf '%s\n' \
              '{' \
              '  "project_info": {' \
              '    "project_number": "000000000000",' \
              '    "project_id": "stub-project"' \
              '  }' \
              '}' > app/google-services.json
          fi

      - name: Build signed APK
        run: ./gradlew assembleRelease

      - name: Show available build-tools
        run: ls /usr/local/lib/android/sdk/build-tools/

      - name: Sign Release
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
          groups: testers
          file: ${{ steps.sign_app.outputs.signedReleaseFile }}
          debug: true